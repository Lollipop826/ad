name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_windows.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
        pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple

    - name: Download Silero VAD ONNX model
      run: |
        pip install silero-vad --target silero_tmp -i https://pypi.tuna.tsinghua.edu.cn/simple
        mkdir -p dist_data
        copy silero_tmp\silero_vad\data\silero_vad.onnx dist_data\silero_vad.onnx
      shell: cmd

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller voice_server.py `
          --onedir `
          --add-data "static;static" `
          --add-data "dist_data/silero_vad.onnx;." `
          --hidden-import uvicorn `
          --hidden-import uvicorn.logging `
          --hidden-import uvicorn.loops `
          --hidden-import uvicorn.loops.auto `
          --hidden-import uvicorn.protocols `
          --hidden-import uvicorn.protocols.websockets `
          --hidden-import uvicorn.protocols.websockets.auto `
          --hidden-import uvicorn.lifespan `
          --hidden-import uvicorn.lifespan.on `
          --hidden-import fastapi `
          --hidden-import onnxruntime `
          --exclude-module torch `
          --exclude-module funasr `
          --exclude-module speechbrain `
          --exclude-module transformers `
          --exclude-module matplotlib `
          --exclude-module scipy `
          --name voice_server_app `
          --noconfirm
      shell: pwsh

    - name: Copy .env.example into dist
      run: |
        copy .env.example dist\voice_server_app\.env.example
      shell: cmd
      continue-on-error: true

    - name: Create startup script
      run: |
        echo @echo off > dist\voice_server_app\启动服务器.bat
        echo echo 请确保 .env 文件已配置正确 >> dist\voice_server_app\启动服务器.bat
        echo voice_server_app.exe >> dist\voice_server_app\启动服务器.bat
        echo pause >> dist\voice_server_app\启动服务器.bat
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: voice_server_windows
        path: dist/voice_server_app/
        retention-days: 30
