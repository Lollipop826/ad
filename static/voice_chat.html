<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆守护 · 认知评估助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Chart.js & PDF Export -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            /* 🧠 AD 认知评估主题 — 沉稳医疗蓝 + 温暖关怀橙 */
            --primary-color: #4A90A4;      /* 医疗蓝绿 — 专业可信 */
            --primary-dark: #2C6E7F;       /* 深蓝绿 */
            --accent-color: #E8925B;       /* 暖橙 — 关怀温暖 */
            --bg-color: #F5F7FA;           /* 淡灰蓝 — 护眼舒适 */

            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-primary: #2D3748;       /* 深灰 */
            --text-secondary: #718096;
            --font-main: 'Noto Sans SC', 'Nunito', sans-serif;

            /* 状态色 */
            --status-listening: #D69E2E;   /* 金色 — 聆听 */
            --status-thinking: #805AD5;    /* 紫色 — 思考/大脑 */
            --status-speaking: #38A169;    /* 绿色 — 说话 */

            /* Orb 渐变 — 脑神经主题 */
            --orb-idle: radial-gradient(circle at 30% 30%, #E2E8F0, #CBD5E0);
            --orb-speaking: radial-gradient(circle at 30% 30%, #C6F6D5, #38A169);
            --orb-thinking: radial-gradient(circle at 30% 30%, #E9D8FD, #805AD5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 环境背景 — 柔和脑神经纹理 */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(128, 90, 213, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(74, 144, 164, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(232, 146, 91, 0.04) 0%, transparent 40%),
                linear-gradient(180deg, #F0F4F8 0%, #F5F7FA 100%);
            z-index: -1;
        }

        /* App Container */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            height: 100%;
            padding: 0 1rem;
        }

        /* --- Header --- */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.02em;
        }

        .drawer-toggle {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s;
        }

        .drawer-toggle:hover {
            color: var(--primary-color);
        }

        /* --- Hero Section (Orb) --- */
        #hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 300px;
        }

        /* 🧠 Brain Orb — 更大更醒目 */
        .orb-container {
            width: 240px;
            height: 240px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            background: var(--orb-idle);
            box-shadow:
                inset 10px 10px 30px rgba(255, 255, 255, 0.4),
                0 0 40px rgba(74, 144, 164, 0.15);
            animation: morph 6s linear infinite;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: absolute;
        }

        /* 🧠 Orb 脑电波环 */
        .orb::before {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            border: 2px dashed rgba(128, 90, 213, 0.15);
            animation: orb-ring-spin 12s linear infinite;
        }

        @keyframes orb-ring-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .orb.speaking {
            background: var(--orb-speaking);
            filter: drop-shadow(0 0 25px rgba(56, 161, 105, 0.4));
            animation: morph 3s linear infinite, pulse 1s ease-in-out infinite alternate;
        }

        .orb.speaking::before {
            border-color: rgba(56, 161, 105, 0.3);
            animation: orb-ring-spin 4s linear infinite;
        }

        .orb.thinking {
            background: var(--orb-thinking);
            animation: spin 4s linear infinite;
            border-radius: 45%;
            width: 220px;
            height: 220px;
            filter: drop-shadow(0 0 30px rgba(128, 90, 213, 0.35));
        }

        .orb.thinking::before {
            border-color: rgba(128, 90, 213, 0.4);
            border-width: 3px;
            animation: orb-ring-spin 3s linear infinite reverse;
            inset: -20px;
        }

        .orb.listening {
            transform: scale(1.08);
            filter: drop-shadow(0 0 25px rgba(214, 158, 46, 0.3));
        }

        .orb.listening::before {
            border-color: rgba(214, 158, 46, 0.3);
        }

        @keyframes morph {

            0%,
            100% {
                border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
                transform: translate3d(0, 0, 0) rotateZ(0.01deg);
            }

            34% {
                border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%;
                transform: translate3d(0, 5px, 0) rotateZ(0.01deg);
            }

            67% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: translate3d(0, -3px, 0) rotateZ(0.01deg);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.08);
            }
        }

        /* 状态徽章 — 加大 */
        .status-badge {
            margin-top: 1.5rem;
            padding: 0.7rem 1.8rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- Conversation Stream --- */
        #conversation-stream {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 2rem;
            scroll-behavior: smooth;
            /* Mask to fade out top */
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #event-log-panel {
            margin: 0 2rem 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 22px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: box-shadow 0.25s ease;
        }

        #event-log-panel:hover {
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
        }

        .event-log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.9rem 1rem;
            cursor: pointer;
        }

        .event-log-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .event-log-title i {
            color: var(--primary-color);
        }

        .event-log-summary {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .event-log-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .log-chip {
            border: none;
            border-radius: 999px;
            padding: 0.4rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(74, 144, 164, 0.12);
            color: var(--primary-dark);
        }

        .log-chip.secondary {
            background: rgba(113, 128, 150, 0.12);
            color: var(--text-secondary);
        }

        .log-chip.active {
            background: rgba(232, 146, 91, 0.18);
            color: #B65F26;
        }

        .event-log-body {
            max-height: 240px;
            overflow-y: auto;
            padding: 0 1rem 1rem;
            border-top: 1px solid rgba(226, 232, 240, 0.8);
        }

        #event-log-panel.collapsed .event-log-body {
            display: none;
        }

        .event-log-list {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            padding-top: 0.9rem;
        }

        .event-log-empty {
            padding: 1rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .event-item {
            display: grid;
            grid-template-columns: 72px 84px 1fr;
            gap: 0.75rem;
            align-items: start;
            padding: 0.75rem 0.85rem;
            background: rgba(255, 255, 255, 0.66);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
        }

        .event-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            padding-top: 0.2rem;
        }

        .event-tag {
            justify-self: start;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border-radius: 999px;
            padding: 0.28rem 0.55rem;
            font-size: 0.72rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .event-tag.state { background: rgba(74, 144, 164, 0.14); color: #2C6E7F; }
        .event-tag.asr { background: rgba(214, 158, 46, 0.16); color: #9C6B06; }
        .event-tag.ai { background: rgba(56, 161, 105, 0.14); color: #26734A; }
        .event-tag.tts { background: rgba(128, 90, 213, 0.14); color: #6841C6; }
        .event-tag.score { background: rgba(232, 146, 91, 0.16); color: #B65F26; }
        .event-tag.speaker { background: rgba(66, 153, 225, 0.16); color: #2B6CB0; }
        .event-tag.system { background: rgba(113, 128, 150, 0.14); color: #4A5568; }
        .event-tag.error { background: rgba(245, 101, 101, 0.16); color: #C53030; }

        .event-main {
            min-width: 0;
        }

        .event-message {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.55;
            word-break: break-word;
        }

        .event-detail {
            margin-top: 0.25rem;
            font-size: 0.76rem;
            color: var(--text-secondary);
            line-height: 1.45;
            word-break: break-word;
        }

        .event-caret {
            transition: transform 0.2s ease;
            color: var(--text-secondary);
        }

        #event-log-panel.collapsed .event-caret {
            transform: rotate(-90deg);
        }

        .message-row {
            display: flex;
            margin-bottom: 0.5rem;
            animation: messageSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            animation-fill-mode: both;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 1.1rem 1.6rem;
            font-size: 1.05rem;
            line-height: 1.75;
            border-radius: 24px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* AI Bubble - Glassmorphism */
        .ai .bubble {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            box-shadow:
                0 4px 30px rgba(0, 0, 0, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .ai .bubble:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        /* 用户消息气泡 — 医疗蓝绿 */
        .user .bubble {
            background: linear-gradient(135deg,
                    rgba(74, 144, 164, 0.88),
                    rgba(44, 110, 127, 0.92));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 144, 164, 0.3);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow:
                0 4px 25px rgba(74, 144, 164, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .user .bubble:hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 35px rgba(74, 144, 164, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* Typing indicator for AI */
        .bubble.typing::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
            margin-left: 8px;
            animation: typingDot 1.4s infinite ease-in-out both;
        }

        @keyframes typingDot {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Emotion Label - Modern Pill */
        .emotion-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 评估结果标签 */
        .eval-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .eval-label.correct { background: rgba(16, 185, 129, 0.15); color: #059669; border-color: rgba(16, 185, 129, 0.3); }
        .eval-label.incorrect { background: rgba(239, 68, 68, 0.15); color: #DC2626; border-color: rgba(239, 68, 68, 0.3); }
        .eval-label.chat { background: rgba(139, 92, 246, 0.15); color: #7C3AED; border-color: rgba(139, 92, 246, 0.3); }
        .eval-label.pending { background: rgba(245, 158, 11, 0.15); color: #D97706; border-color: rgba(245, 158, 11, 0.3); }

        /* ===== 🧠 思考指示器 — 大号醒目 ===== */
        .thinking-bubble {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 1.4rem 2rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(128, 90, 213, 0.15);
            border-radius: 24px;
            max-width: 90%;
            width: 100%;
            animation: thinkingSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 8px 32px rgba(128, 90, 213, 0.12);
        }

        @keyframes thinkingSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.92);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .thinking-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #805AD5, #B794F4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
            position: relative;
        }

        .thinking-icon::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #805AD5;
            border-right-color: rgba(128, 90, 213, 0.3);
            animation: thinkingSpin 1s linear infinite;
        }

        .thinking-content {
            flex: 1;
            min-width: 0;
        }

        .thinking-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 5px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: #805AD5;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .thinking-dots span:nth-child(1) { animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        .thinking-status {
            font-size: 1rem;
            color: var(--text-secondary);
            transition: opacity 0.3s ease;
            line-height: 1.5;
        }

        /* 进度条 — 加粗 */
        .thinking-progress {
            height: 4px;
            background: #EDE9FE;
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .thinking-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #805AD5, #B794F4, #805AD5);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: progressShimmer 2s ease-in-out infinite;
        }

        @keyframes progressShimmer {
            0%   { width: 15%; margin-left: 0; background-position: 0% 0; }
            50%  { width: 50%; margin-left: 25%; background-position: 100% 0; }
            100% { width: 15%; margin-left: 85%; background-position: 0% 0; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-10px); }
        }

        @keyframes thinkingSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
            40%           { transform: translateY(-8px); opacity: 1; }
        }

        /* ===== 开场白加载动画 — 大号脑电波 ===== */
        .session-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 2rem 2.5rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(128, 90, 213, 0.12);
            border-radius: 24px;
            max-width: 90%;
            width: 100%;
            animation: thinkingSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 8px 32px rgba(128, 90, 213, 0.1);
        }

        .session-loading .loading-wave {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .session-loading .loading-wave span {
            display: block;
            width: 6px;
            height: 24px;
            background: linear-gradient(180deg, #805AD5, #B794F4);
            border-radius: 3px;
            animation: wave 1.2s ease-in-out infinite;
        }

        .session-loading .loading-wave span:nth-child(1) { animation-delay: 0s; height: 20px; }
        .session-loading .loading-wave span:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .session-loading .loading-wave span:nth-child(3) { animation-delay: 0.2s; height: 40px; }
        .session-loading .loading-wave span:nth-child(4) { animation-delay: 0.3s; height: 30px; }
        .session-loading .loading-wave span:nth-child(5) { animation-delay: 0.4s; height: 20px; }
        .session-loading .loading-wave span:nth-child(6) { animation-delay: 0.5s; height: 30px; }
        .session-loading .loading-wave span:nth-child(7) { animation-delay: 0.6s; height: 40px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.35; }
            50%      { transform: scaleY(1.3); opacity: 1; }
        }

        .session-loading .loading-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .session-loading .loading-sub {
            font-size: 0.85rem;
            color: #A0AEC0;
        }

        /* Message entrance animation */
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Stagger animation for multiple messages */
        .message-row:nth-last-child(1) {
            animation-delay: 0s;
        }

        .message-row:nth-last-child(2) {
            animation-delay: 0.05s;
        }

        .message-row:nth-last-child(3) {
            animation-delay: 0.1s;
        }

        /* --- Control Bar --- */
        #control-bar {
            padding: 1.5rem;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 20;
        }

        .ctrl-btn {
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mic {
            width: 72px;
            height: 72px;
            background: var(--primary-color);
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 8px 25px rgba(74, 144, 164, 0.3);
        }

        .btn-mic:hover {
            transform: scale(1.05);
        }

        .btn-mic:active {
            transform: scale(0.95);
        }

        .btn-mic.recording {
            background: #F56565;
            box-shadow: 0 8px 25px rgba(245, 101, 101, 0.4);
            animation: pulse-red 2s infinite;
        }

        .btn-interrupt {
            background: #F56565;
            color: white;
            width: 48px;
            height: 48px;
            font-size: 1.2rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(245, 101, 101, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(245, 101, 101, 0);
            }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .btn-secondary {
            width: 48px;
            height: 48px;
            background: #EDF2F7;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .btn-secondary:hover {
            background: #E2E8F0;
            color: var(--text-primary);
        }

        /* MMSE 浮动评分提示（右下角，自动淡出） */
        .mmse-badge {
            position: fixed;
            right: 24px;
            bottom: 120px;
            max-width: 340px;
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 16px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.18);
            border-left: 4px solid #4A90A4;
            z-index: 120;
            font-family: var(--font-main);
            font-size: 13px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .mmse-badge-hide {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .mmse-badge-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .mmse-badge-icon {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #ffffff;
            background: linear-gradient(135deg, #4A90A4, #2C6E7F);
            box-shadow: 0 4px 10px rgba(74, 144, 164, 0.4);
            flex-shrink: 0;
        }

        .mmse-badge-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2933;
        }

        .mmse-badge-main {
            font-size: 13px;
            font-weight: 500;
            color: #2d3748;
        }

        .mmse-badge-sub {
            font-size: 12px;
            color: #4b5563;
        }

        .mmse-badge-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .mmse-tag {
            background: #f3f4f6;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            color: #374151;
        }

        /* --- Drawer (Sidebar) --- */
        #drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        #drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 320px;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
        }

        #drawer.open {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .drawer-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Form Styles in Drawer */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            font-size: 1rem;
            font-family: inherit;
            transition: border 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Stats Cards in Drawer */
        .stats-card {
            background: #F7FAFC;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
        }

        /* Speaker Enroll in Drawer */
        .speaker-card {
            background: #F0FFF4;
            border: 1px solid #C6F6D5;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        /* Image Display Modal */
        #image-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        /* 📹 摄像头预览 */
        #camera-container {
            position: fixed;
            bottom: 120px;
            right: 16px;
            z-index: 150;
            display: none;
        }
        #camera-container.active {
            display: block;
        }
        #camera-preview {
            width: 160px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: #000;
        }
        #camera-status {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #38A169;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        #camera-status.evaluating {
            background: var(--status-thinking);
            animation: pulse 1s infinite;
        }
        #camera-status.recording {
            background: #E53E3E;
            animation: pulse 0.8s infinite;
        }
        #camera-label {
            text-align: center;
            font-size: 0.7rem;
            color: white;
            background: rgba(0,0,0,0.6);
            border-radius: 0 0 12px 12px;
            margin-top: -6px;
            padding: 2px 0;
        }

        /* 📹 手动录制控制面板 */
        #record-control {
            position: fixed;
            bottom: 260px;
            right: 16px;
            z-index: 160;
            display: none;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            text-align: center;
            min-width: 170px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
        #record-control.active { display: block; }
        #record-control .rec-title {
            font-size: 0.75rem;
            color: #94A3B8;
            margin-bottom: 6px;
        }
        #record-control .rec-timer {
            font-size: 1.4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #record-control .rec-timer.recording {
            color: #FC8181;
        }
        #record-control .rec-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #FC8181;
            margin-right: 6px;
            animation: pulse 0.8s infinite;
            vertical-align: middle;
        }
        .rec-btn {
            display: inline-block;
            padding: 8px 20px;
            border: none;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .rec-btn:active { transform: scale(0.95); }
        .rec-btn-start {
            background: linear-gradient(135deg, #48BB78, #38A169);
            color: white;
        }
        .rec-btn-stop {
            background: linear-gradient(135deg, #FC8181, #E53E3E);
            color: white;
        }
        .rec-btn-stop:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 声纹拒绝 Toast */
        .speaker-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(245, 101, 101, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 300;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 30px rgba(245, 101, 101, 0.3);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .speaker-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .speaker-toast .toast-icon {
            font-size: 1.1rem;
        }
        .speaker-toast .toast-sim {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-left: 4px;
        }

        /* 🎨 数位板画图 Modal */
        #drawing-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #drawing-modal.open { display: flex; }
        .drawing-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .drawing-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawing-header h3 { margin: 0; color: var(--text-primary); font-size: 1.1rem; }
        .drawing-body {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .drawing-ref {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .drawing-ref img {
            width: 180px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: white;
        }
        .drawing-ref-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .drawing-canvas-wrap {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #drawing-canvas {
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            background: white;
            cursor: crosshair;
            touch-action: none;
            display: block;
            width: 100%;
            height: 320px;
        }
        .drawing-tools {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .drawing-tools label { font-size: 0.8rem; color: var(--text-secondary); }
        .drawing-size-slider { width: 80px; }
        .drawing-color-picker { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; padding: 0; }
        .drawing-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .drawing-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 6px 0;
            flex: 1;
            align-self: center;
        }
        #drawing-evaluating-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.85);
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: 600;
        }
        #drawing-evaluating-overlay.active { display: flex; }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div id="app-container">
        <!-- Header -->
        <header>
            <div class="brand">
                <i class="fas fa-brain" style="color: var(--primary-color)"></i>
                <span>记忆守护 · AD认知评估</span>
            </div>
            <button class="drawer-toggle" onclick="toggleDrawer()">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- Hero Visualization -->
        <div id="hero-section">
            <div class="orb-container">
                <div id="visual-orb" class="orb"></div>
                <!-- 评估结果悬浮显示（位于球内部正中） -->
                <div id="orb-eval-badge" class="eval-label" style="position: absolute; opacity: 0; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-size: 1.3rem; padding: 12px 24px; border-radius: 30px; z-index: 10; font-weight: 700; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); white-space: nowrap;"></div>
            </div>

            <div id="status-display" class="status-badge" style="opacity: 0;">
                <span id="status-icon">🤔</span>
                <span id="status-text">就绪</span>
            </div>
        </div>

        <!-- Conversation Stream -->
        <div id="conversation-stream">
            <div class="message-row ai">
                <div class="bubble">
                    <i class="fas fa-brain" style="margin-right: 8px; color: var(--primary-color);"></i>
                    您好！我是您的认知评估助手。请在左侧填写基本信息后，点击"开始新会话"即可进行阿尔茨海默病认知筛查。
                </div>
            </div>
        </div>

        <div id="event-log-panel" class="collapsed">
            <div class="event-log-header" onclick="toggleEventLogPanel()">
                <div>
                    <div class="event-log-title">
                        <i class="fas fa-wave-square"></i>
                        <span>运行日志</span>
                    </div>
                    <div id="event-log-summary" class="event-log-summary">显示关键流程事件，已自动过滤高频噪音</div>
                </div>
                <div class="event-log-actions">
                    <button id="event-log-pause-btn" class="log-chip secondary" onclick="toggleEventLogPause(event)">暂停滚动</button>
                    <button class="log-chip secondary" onclick="clearEventLog(event)">清空</button>
                    <i class="fas fa-chevron-down event-caret"></i>
                </div>
            </div>
            <div class="event-log-body">
                <div id="event-log-list" class="event-log-list">
                    <div class="event-log-empty">暂无运行事件</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div id="control-bar">
            <!-- Interupt Button (Hidden unless speaking) -->
            <button id="interrupt-btn" class="ctrl-btn btn-interrupt" onclick="interruptAI()" style="display: none;"
                title="打断AI">
                <i class="fas fa-stop"></i>
            </button>

            <button class="ctrl-btn btn-secondary" onclick="switchInputMode()" title="切换输入模式">
                <i class="fas fa-keyboard"></i>
            </button>

            <button id="mic-btn" class="ctrl-btn btn-mic" onclick="toggleRecording()">
                <i class="fas fa-microphone"></i>
            </button>

            <button class="ctrl-btn btn-secondary" onclick="exportChatHistory()" title="导出对话记录">
                <i class="fas fa-download"></i>
            </button>

            <button id="end-btn" class="ctrl-btn btn-secondary" onclick="endSession()" disabled title="结束对话"
                style="color: #F56565;">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <!-- Text Input Overlay (Hidden by default) -->
        <div id="text-input-bar"
            style="display: none; padding: 1rem; background: white; position: absolute; bottom: 0; width: 100%; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 25;">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="text-input" class="input" placeholder="输入消息..."
                    onkeypress="if(event.key==='Enter') sendTextMessage()">
                <button class="ctrl-btn btn-secondary" onclick="sendTextMessage()"
                    style="background: var(--primary-color); color: white;">
                    <i class="fas fa-paper-plane"></i>
                </button>
                <button class="ctrl-btn btn-secondary" onclick="switchInputMode()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Drawer (Settings & MMSE) -->
    <div id="drawer-overlay" onclick="toggleDrawer()"></div>
    <div id="drawer">
        <div class="drawer-header">
            <span class="drawer-title">认知筛查设置</span>
            <button class="close-btn" onclick="toggleDrawer()">&times;</button>
        </div>

        <!-- Patient Info -->
        <div class="input-group">
            <label class="label">姓名</label>
            <input type="text" id="patient-name" class="input" placeholder="请输入姓名">
        </div>

        <div class="input-group" style="display: flex; gap: 1rem;">
            <div style="flex: 1;">
                <label class="label">年龄</label>
                <input type="number" id="patient-age" class="input" value="70">
            </div>
            <div style="flex: 1;">
                <label class="label">性别</label>
                <select id="patient-sex" class="input" style="height: 48px;">
                    <option value="女">女</option>
                    <option value="男">男</option>
                </select>
            </div>
        </div>

        <button onclick="startSession()" id="start-btn"
            style="width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(74,144,164,0.3);">
            🧠 开始认知筛查
        </button>

        <hr style="border: 0; border-top: 1px solid #E2E8F0; margin-bottom: 2rem;">

        <!-- Speaker Verification (Restored) -->
        <div class="speaker-card">
            <div class="label" style="display: flex; justify-content: space-between; align-items: center;">
                声纹验证
                <label style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="speaker-verify-toggle" onchange="toggleSpeakerVerify(this.checked)">
                    <span id="verify-status-text" style="font-size: 0.75rem; color: #718096;">关闭</span>
                </label>
            </div>

            <!-- Saved Speakers Dropdown -->
            <div style="margin-bottom: 0.8rem;">
                <div style="font-size: 0.8rem; color: #666; margin-bottom: 0.3rem;">已保存的声纹：</div>
                <select id="saved-speakers" onchange="loadSelectedSpeaker()"
                    style="width: 100%; padding: 0.5rem; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 0.9rem;">
                    <option value="">请选择或新建</option>
                </select>
            </div>

            <!-- Name Input -->
            <div class="input-group">
                <input type="text" id="speaker-name-input" class="input" placeholder="说话人姓名">
            </div>

            <!-- Enroll Button -->
            <button id="enroll-btn" onclick="toggleEnrollRecording()"
                style="width: 100%; padding: 0.6rem; background: var(--primary-dark); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 0.5rem;">
                🎙️ 开始录制
            </button>

            <!-- Sample Progress Dots -->
            <div style="display: flex; gap: 0.3rem; margin-bottom: 0.5rem; flex-wrap: wrap; justify-content: center;">
                <div id="sample-1" class="sample-dot"
                    style="width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;">
                    1</div>
                <div id="sample-2" class="sample-dot"
                    style="width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;">
                    2</div>
                <div id="sample-3" class="sample-dot"
                    style="width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;">
                    3</div>
                <div id="sample-4" class="sample-dot"
                    style="width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;">
                    4</div>
                <div id="sample-5" class="sample-dot"
                    style="width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;">

    <script>
        // --- UI Logic ---
        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('drawer-overlay').classList.toggle('open');
        }

        function switchInputMode() {
            const textBar = document.getElementById('text-input-bar');
            if (textBar.style.display === 'none') {
                textBar.style.display = 'block';
                document.getElementById('text-input').focus();
            } else {
                textBar.style.display = 'none';
            }
        }

        // --- Core Logic ---
        let ws = null;
        let isRecording = false;
        let sessionStarted = false;
        let eventLogs = [];
        let eventLogPaused = false;
        let ttsChunkMetrics = { count: 0, startedAt: 0, lastSampleRate: null };
        const EVENT_LOG_LIMIT = 80;
        let audioContext = null;
        let audioWorkletNode = null;
        let streamingPlayer = null; // 🎵 New Stream Player

        // Auto-connect
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const WS_URL = `${protocol}//${window.location.host}/ws`;

        // MMSE Data — 前端统一用这6个key，后端可能发 attention_calculation
        const mmseScores = {
            orientation: { score: 0 },
            registration: { score: 0 },
            attention_calculation: { score: 0 },
            recall: { score: 0 },
            language: { score: 0 },
            copy: { score: 0 }
        };
        const mmseDimensionMeta = {
            orientation: { label: '定向力', max: 10 },
            registration: { label: '即时记忆', max: 3 },
            attention_calculation: { label: '注意与计算', max: 5 },
            recall: { label: '回忆能力', max: 3 },
            language: { label: '语言能力', max: 8 },
            copy: { label: '视空间', max: 1 }
        };
        const emotionLabels = {
            normal: { text: '正常', class: 'normal' },
            avoidance: { text: '回避', class: 'avoidance' },
            distress: { text: '困扰', class: 'distress' },
            hostility: { text: '对抗', class: 'hostility' }
        };

        // Emotion Stats for Report
        const emotionStats = { normal: 0, avoidance: 0, distress: 0, hostility: 0 };
        function recordEmotion(emotion) {
            if (emotionStats.hasOwnProperty(emotion)) {
                emotionStats[emotion]++;
            }
        }

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('Connected');
                transitionTo('idle', '已连接');
                initCharts();
                refreshSpeakersList();
            };

            ws.onclose = () => {
                transitionTo('idle', '连接断开，重连中...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        // 最近一次 MMSE 浮动提示的定时器
        let lastMMSEBadgeTimer = null;

        // 计算本轮MMSE更新中“哪个维度发生了变化”（与当前前端缓存的 mmseScores 对比）
        function computeMMSEDelta(summary, performance) {
            const details = summary?.scoring_details?.dimension_scores || {};
            const dimIds = Object.keys(details);
            if (!dimIds.length) return null;

            let changed = null;
            dimIds.forEach(id => {
                const newScore = details[id]?.score ?? 0;
                const oldScore = mmseScores[id]?.score ?? 0;
                const delta = newScore - oldScore;
                if (delta > 0) {
                    if (!changed || delta > changed.delta) {
                        const meta = mmseDimensionMeta[id] || { label: id, max: details[id]?.max_score ?? 0 };
                        changed = {
                            dimensionId: id,
                            dimensionLabel: meta.label,
                            oldScore,
                            newScore,
                            delta,
                            maxScore: meta.max ?? details[id]?.max_score ?? 0
                        };
                    }
                }
            });

            if (!changed) return null;

            // 从 performance 里查该维度最近一次质量/认知表现
            let quality = null;
            let cognitive = null;
            if (performance && performance.performance_details && performance.performance_details.dimension_summary) {
                const dimPerf = performance.performance_details.dimension_summary[changed.dimensionId];
                if (dimPerf) {
                    quality = dimPerf.latest_quality_level || null;
                    cognitive = dimPerf.latest_cognitive_performance || dimPerf.latest_performance || null;
                }
            }

            return {
                ...changed,
                totalScore: summary?.total_score ?? null,
                totalMaxScore: summary?.total_max_score ?? 30,
                cognitiveStatus: summary?.cognitive_status || '',
                qualityLevel: quality,
                cognitivePerformance: cognitive
            };
        }

        function showMMSEBadge(delta) {
            if (!delta) return;
            if (lastMMSEBadgeTimer) {
                clearTimeout(lastMMSEBadgeTimer);
                lastMMSEBadgeTimer = null;
            }

            let badge = document.getElementById('mmse-badge');
            if (!badge) {
                badge = document.createElement('div');
                badge.id = 'mmse-badge';
                badge.className = 'mmse-badge';
                document.body.appendChild(badge);
            }

            const dimText = `${delta.dimensionLabel} +${delta.delta} 分，当前 ${delta.newScore}/${delta.maxScore || '?'}`;
            const totalText = (delta.totalScore != null)
                ? `当前总分 ${delta.totalScore}/${delta.totalMaxScore || 30}`
                : '';
            const statusText = delta.cognitiveStatus || '';

            // 回答质量与认知表现标签
            let qualityTag = '';
            if (delta.qualityLevel) {
                const q = String(delta.qualityLevel).toLowerCase();
                const qualityMap = {
                    excellent: '回答质量：优秀',
                    good: '回答质量：良好',
                    fair: '回答质量：一般',
                    poor: '回答质量：较差'
                };
                qualityTag = qualityMap[q] || `回答质量：${delta.qualityLevel}`;
            }
            const cognitiveTag = delta.cognitivePerformance ? `认知表现：${delta.cognitivePerformance}` : '';

            badge.classList.remove('mmse-badge-hide');
            badge.innerHTML = `
                <div class="mmse-badge-header">
                    <div class="mmse-badge-icon">🧪</div>
                    <div class="mmse-badge-title">本轮MMSE评分更新（临床参考）</div>
                </div>
                <div class="mmse-badge-main">${dimText}</div>
                <div class="mmse-badge-sub">${[totalText, statusText].filter(Boolean).join(' · ')}</div>
                <div class="mmse-badge-meta">
                    ${qualityTag ? `<span class="mmse-tag">${qualityTag}</span>` : ''}
                    ${cognitiveTag ? `<span class="mmse-tag">${cognitiveTag}</span>` : ''}
                    <span class="mmse-tag">自动计分已记录</span>
                    <span class="mmse-tag">仅供临床参考</span>
                </div>
            `;

            lastMMSEBadgeTimer = setTimeout(() => {
                badge.classList.add('mmse-badge-hide');
            }, 5500);
        }

        // ==========================================
        // 🎯 统一状态机 (Unified State Machine)
        // ==========================================
        // 所有状态: idle → listening → processing → speaking → listening
        //           session_loading (开场白等待)
        // ==========================================

        let currentAppState = 'idle'; // idle, listening, processing, speaking, session_loading

        function transitionTo(newState, extra) {
            const prevState = currentAppState;
            currentAppState = newState;
            console.log(`[状态] ${prevState} → ${newState}`, extra || '');
            recordEvent('state', `状态切换：${prevState} → ${newState}`, extra || '');

            const orb = document.getElementById('visual-orb');
            const badge = document.getElementById('status-display');
            const icon = document.getElementById('status-icon');
            const label = document.getElementById('status-text');
            const interruptBtn = document.getElementById('interrupt-btn');

            // Reset orb
            orb.className = 'orb';
            badge.style.opacity = '1';

            switch (newState) {
                case 'idle':
                    label.textContent = extra || '就绪';
                    icon.textContent = '✅';
                    badge.style.color = 'var(--primary-color)';
                    interruptBtn.style.display = 'none';
                    hideThinking();
                    break;

                case 'listening':
                    orb.classList.add('listening');
                    icon.textContent = '👂';
                    label.textContent = extra || '正在听...';
                    badge.style.color = 'var(--status-listening)';
                    interruptBtn.style.display = 'none';
                    break;

                case 'processing':
                    orb.classList.add('thinking');
                    icon.textContent = '🧠';
                    label.textContent = extra || '认知分析中...';
                    badge.style.color = 'var(--status-thinking)';
                    interruptBtn.style.display = 'none';
                    showThinking();
                    break;

                case 'speaking':
                    orb.classList.add('speaking');
                    icon.textContent = '🗣️';
                    label.textContent = extra || '正在说...';
                    badge.style.color = 'var(--status-speaking)';
                    interruptBtn.style.display = 'flex';
                    hideThinking();
                    break;

                case 'session_loading':
                    orb.classList.add('thinking');
                    icon.textContent = '⏳';
                    label.textContent = extra || '正在初始化筛查...';
                    badge.style.color = 'var(--status-thinking)';
                    interruptBtn.style.display = 'none';
                    showSessionLoading();
                    break;
            }
        }

        function handleMessage(data) {
            console.log('[收到消息]', data.type);

            if (data.type === 'vad_start') {
                recordEvent('state', '检测到用户开始说话');
                // VAD 检测到用户说话 → 停止 AI 音频
                if (streamingPlayer) streamingPlayer.stop();
                transitionTo('listening', '检测到语音...');

            } else if (data.type === 'vad_end') {
                recordEvent('state', '用户语音结束，进入处理中');
                // VAD 检测语音结束 → 进入处理状态
                transitionTo('processing', '正在处理...');

            } else if (data.type === 'asr_result') {
                recordEvent('asr', '识别到用户回答', data.text);
                // ASR 识别结果 → 更新思考指示器，保持 processing 状态
                appendMessage('user', data.text);
                if (currentAppState === 'processing') {
                    updateThinkingStatus('📊 已识别回答，正在认知评估...');
                }

            } else if (data.type === 'processing_status') {
                recordEvent('system', '处理进度更新', data.text || '处理中...');
                // 🔥 后端处理进度更新 → 保持 processing 状态，更新提示文字
                if (currentAppState !== 'processing') {
                    transitionTo('processing', data.text || '处理中...');
                } else {
                    updateThinkingStatus(data.text || '处理中...');
                }

            } else if (data.type === 'tool_log') {
                appendToolLog(data.event || {});

            } else if (data.type === 'ai_response') {
                recordEvent('ai', 'AI 生成文本回复', data.text);
                // AI 文本回复 → 清除等待动画，显示回复文字
                // 不切到 speaking，等首个 tts_chunk 或 tts_audio 到达才切
                hideSessionLoading();
                hideThinking();
                // We use appendMessage directly from message event now, ai_response might be redundant but keeping for compatibility
                if (currentAppState === 'processing') {
                    updateStatusBadge('🎵', '正在合成语音...', 'var(--status-thinking)');
                }

            } else if (data.type === 'tts_start') {
                // TTS 流准备 → 只初始化播放器，不切换 UI 状态
                if (!streamingPlayer) streamingPlayer = new StreamingAudioPlayer();
                window._ttsStartTime = performance.now();
                window._ttsChunkCount = 0;
                ttsChunkMetrics = { count: 0, startedAt: Date.now(), lastSampleRate: null };
                recordEvent('tts', '语音合成开始', `AudioContext: ${streamingPlayer.audioContext.state}`);
                console.log('[TTS] 播放器已就绪, AudioContext state:', streamingPlayer.audioContext.state);

            } else if (data.type === 'tts_chunk') {
                window._ttsChunkCount = (window._ttsChunkCount || 0) + 1;
                ttsChunkMetrics.count += 1;
                ttsChunkMetrics.lastSampleRate = data.sample_rate || 24000;
                const elapsed = window._ttsStartTime ? ((performance.now() - window._ttsStartTime) / 1000).toFixed(3) : '?';
                const chunkSizeKB = data.chunk ? (data.chunk.length / 1024).toFixed(0) : '?';
                const acState = streamingPlayer ? streamingPlayer.audioContext.state : 'no-player';
                console.log(`[TTS] 🔊 收到块${window._ttsChunkCount} | t=${elapsed}s | ${chunkSizeKB}KB | AudioCtx=${acState}`);
                if (ttsChunkMetrics.count === 1 || ttsChunkMetrics.count % 10 === 0) {
                    upsertAggregateEvent('tts-stream', 'tts', `语音流接收中：${ttsChunkMetrics.count} 个音频块`, `已接收约 ${elapsed}s，采样率 ${ttsChunkMetrics.lastSampleRate}Hz，AudioContext ${acState}`);
                }
                
                // TTS 音频块到达 → 首块时切换到 speaking
                if (currentAppState !== 'speaking') {
                    hideThinking();
                    hideSessionLoading();
                    transitionTo('speaking', '正在播放');
                }
                if (streamingPlayer) {
                    streamingPlayer.addChunk(data.chunk, data.sample_rate || 24000);
                    console.log(`[TTS] ▶️ 块${window._ttsChunkCount} 已加入播放队列, isPlaying=${streamingPlayer.isPlaying}`);
                } else {
                    console.error('[TTS] ❌ streamingPlayer 为空！音频丢失');
                    recordEvent('error', '语音块丢失', 'streamingPlayer 为空');
                }

            } else if (data.type === 'tts_end') {
                const ttsDuration = ttsChunkMetrics.startedAt ? ((Date.now() - ttsChunkMetrics.startedAt) / 1000).toFixed(1) : '?';
                removeAggregateEvent('tts-stream');
                recordEvent('tts', '语音流结束', `共 ${ttsChunkMetrics.count} 个音频块，约 ${ttsDuration}s`);
                // TTS 流结束 → 延迟切回监听
                setTimeout(() => {
                    if (!streamingPlayer || !streamingPlayer.isPlaying) {
                        if (isRecording) {
                            transitionTo('listening');
                        } else {
                            transitionTo('idle', '等待操作');
                        }
                    }
                }, (data.duration || 2) * 1000);

            } else if (data.type === 'tts_audio') {
                recordEvent('tts', '收到完整语音音频', `采样率 ${data.sample_rate || '?' }Hz`);
                // 完整音频到达 → 正式切换到播放状态
                hideThinking();
                hideSessionLoading();
                if (!streamingPlayer) streamingPlayer = new StreamingAudioPlayer();
                streamingPlayer.addChunk(data.audio, data.sample_rate);
                transitionTo('speaking', '正在播放');

            } else if (data.type === 'tts_stop' || data.type === 'stop_tts' || data.type === 'interrupt') {
                removeAggregateEvent('tts-stream');
                recordEvent('tts', '语音播放被打断');
                // 打断信号
                if (streamingPlayer) streamingPlayer.stop();
                transitionTo('listening', '已打断');

            } else if (data.type === 'update_score') {
                const total = data?.data?.total_score ?? data?.data?.score ?? '';
                recordEvent('score', '认知评分已更新', total !== '' ? `当前总分 ${total}` : '');
                // 先基于当前前端缓存+认知表现计算“本轮变动的维度”，再更新整体MMSE数据
                const delta = computeMMSEDelta(data.data, data.performance);
                updateMMSE(data.data);
                if (delta) {
                    showMMSEBadge(delta);
                }

            } else if (data.type === 'show_image') {
                recordEvent('system', '展示题目图片', data.title || data.url || data.image_url || data.image_id || '');
                showImage(data.url || data.image_url || data.image_id, data.title);
                // 🔥 闭眼任务展示图片时，自动开启摄像头进行视觉评估
                const imgId = data.image_id || '';
                if (imgId === 'close_eyes') {
                    startVisionTask('language_reading_close_eyes', 5000);
                }

            } else if (data.type === 'vision_capture') {
                // 后端请求前端开启摄像头并截图评估
                const taskId = data.task_id || '';
                const delay = data.delay || 3000;
                const mode = data.mode || 'auto';
                console.log(`[Vision] 收到视觉捕获请求: ${taskId}, mode=${mode}`);
                startVisionTask(taskId, delay, mode);

            } else if (data.type === 'vision_stop') {
                // 后端请求关闭摄像头
                stopCamera();

            } else if (data.type === 'drawing_evaluating') {
                document.getElementById('drawing-evaluating-overlay').classList.add('active');
                document.getElementById('drawing-status').textContent = data.message || 'AI 正在评估画作...';
                recordEvent('system', '画作评估中', data.message || '');

            } else if (data.type === 'drawing_result') {
                document.getElementById('drawing-evaluating-overlay').classList.remove('active');
                if (data.error) {
                    document.getElementById('drawing-status').textContent = '❌ 评估失败: ' + data.error;
                    document.getElementById('drawing-submit-btn').disabled = false;
                    recordEvent('system', '画图评估失败', data.error);
                } else {
                    const r = data.result || {};
                    const ok = r.is_correct === true ? '✅ 正确' : r.is_correct === false ? '❌ 不正确' : '❓ 无法判断';
                    document.getElementById('drawing-status').textContent = `评估完成：${ok}（${r.quality_level || ''}）`;

        function renderEventLogs() {

            const visibleLogs = eventLogs.slice(-20);
            list.innerHTML = visibleLogs.map(item => `

                    <div class="event-main">

                        ${item.detail ? `<div class="event-detail">${escapeHtml(item.detail)}</div>` : ''}
                    </div>
                </div>
            `).join('');

            const latest = eventLogs[eventLogs.length - 1];
            summary.textContent = `最近 ${visibleLogs.length} 条工具日志 · 最新：${latest.message}`;

        function summarizeMap(data) {
            if (!data || typeof data !== 'object') return '';
            return Object.entries(data).map(([key, value]) => `${key}: ${value}`).join(' | ');
        }

        function appendToolLog(event) {
            const phase = event.phase || 'log';
            const toolName = event.tool_name || 'Tool';
            const icon = event.icon || '🔧';
            const time = event.timestamp || formatEventTime();

            let message = `${icon} ${toolName}`;
            let detail = '';

            if (phase === 'start') {
                message = `${icon} ${toolName} 开始调用`;
                detail = summarizeMap(event.inputs);
            } else if (phase === 'end') {
                message = `${icon} ${toolName} 调用完成`;
                const outputText = summarizeMap(event.outputs);
                detail = [outputText, event.elapsed_s !== undefined ? `耗时: ${event.elapsed_s}s` : ''].filter(Boolean).join(' | ');
            } else if (phase === 'step') {
                message = `${icon} ${toolName} 执行步骤`;
                detail = event.message || '';
            } else {
                message = `${icon} ${toolName} 日志`;
                detail = event.message || '';
            }

            eventLogs.push({
                id: event.log_id ? `${event.log_id}-${phase}-${Date.now()}` : `tool-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                type: 'system',
                label: toolName,
                message,
                detail,
                time
            });

            if (eventLogs.length > EVENT_LOG_LIMIT) {
                eventLogs = eventLogs.slice(-EVENT_LOG_LIMIT);
            }
            renderEventLogs();
        }

        // --- 🎵 Robust Streaming Audio Player ---
        // 🔥 全局共享 AudioContext（避免反复创建，确保用户手势后可用）
        let _sharedAudioCtx = null;
        function getSharedAudioContext() {
            if (!_sharedAudioCtx || _sharedAudioCtx.state === 'closed') {
                _sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // 每次获取都尝试 resume，确保不卡在 suspended
            if (_sharedAudioCtx.state === 'suspended') {
                _sharedAudioCtx.resume().catch(() => {});
            }
            return _sharedAudioCtx;
        }

        class StreamingAudioPlayer {
            constructor() {
                this.audioContext = getSharedAudioContext();
                this.nextStartTime = 0;
                this.activeSources = [];
                this.isPlaying = false;
                console.log('[AudioPlayer] 初始化, AudioContext state:', this.audioContext.state);
                recordEvent('tts', '音频播放器已初始化', `AudioContext: ${this.audioContext.state}`);
            }

            addChunk(chunkBase64, sampleRate = 24000) {
                try {
                    // 🔥 每次添加音频块时确保 AudioContext 是 running 状态
                    if (this.audioContext.state === 'suspended') {
                        this.audioContext.resume().catch(() => {});
                    }

                    const binaryString = atob(chunkBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const floatArray = new Float32Array(bytes.buffer);
                    const audioBuffer = this.audioContext.createBuffer(1, floatArray.length, sampleRate);
                    audioBuffer.getChannelData(0).set(floatArray);
                    this.playBuffer(audioBuffer);
                } catch (e) {
                    console.error('[AudioPlayer] 解码音频失败:', e);
                    recordEvent('error', '音频解码失败', e.message || String(e));
                }
            }

            playBuffer(audioBuffer) {
                this.isPlaying = true;
                const source = this.audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(this.audioContext.destination);

                const currentTime = this.audioContext.currentTime;
                const startTime = Math.max(currentTime, this.nextStartTime);
                source.start(startTime);
                this.nextStartTime = startTime + audioBuffer.duration;
                this.activeSources.push(source);

                source.onended = () => {
                    const idx = this.activeSources.indexOf(source);
                    if (idx > -1) this.activeSources.splice(idx, 1);
                    if (this.activeSources.length === 0) {
                        this.isPlaying = false;
                        // 播放结束 → 自动回到监听/空闲
                        if (isRecording) {
                            transitionTo('listening');
                        } else {
                            transitionTo('idle', '等待操作');
                        }
                    }
                };
            }

            stop() {
                this.activeSources.forEach(src => { try { src.stop(); } catch (e) { } });
                this.activeSources = [];
                this.nextStartTime = this.audioContext.currentTime;
                this.isPlaying = false;
                console.log('[AudioPlayer] 已停止播放');
                recordEvent('tts', '音频播放已停止');
                transitionTo('listening');
            }

            reset() {
                this.stop();
                this.nextStartTime = 0;
            }
        }

        function interruptAI() {
            if (streamingPlayer) streamingPlayer.stop();
            if (ws) ws.send(JSON.stringify({ type: 'interrupt' }));
            console.log("Interrupt sent");
            recordEvent('tts', '已发送打断指令');
        }

        // --- 🎤 Robust Recording (AudioWorklet) ---
        // Inline AudioWorklet Processor Code
        const audioWorkletCode = `
            class AudioSenderProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.bufferIndex = 0;
                    this.bufferSize = 4096;
                    this.buffer = new Float32Array(this.bufferSize);
                }
                process(inputs, outputs, parameters) {
                    const input = inputs[0];
                    if (!input || !input.length) return true;
                    const channel = input[0];
                    for (let i = 0; i < channel.length; i++) {
                        this.buffer[this.bufferIndex++] = channel[i];
                        if (this.bufferIndex >= this.bufferSize) {
                            this.port.postMessage(this.buffer.slice());
                            this.bufferIndex = 0;
                        }
                    }
                    return true;
                }
            }
            registerProcessor('audio-sender-processor', AudioSenderProcessor);
        `;

        async function toggleRecording() {
            if (!sessionStarted) { /* check session start... */ }

            if (!isRecording) {
                // Start
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

                    // Add Worklet
                    const blob = new Blob([audioWorkletCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    await audioContext.audioWorklet.addModule(url);

                    const source = audioContext.createMediaStreamSource(stream);
                    audioWorkletNode = new AudioWorkletNode(audioContext, 'audio-sender-processor');

                    audioWorkletNode.port.onmessage = (e) => {
                        if (!isRecording) return;
                        // 🔥 v1优化: 直接发送二进制 Int16 buffer，替代 JSON 序列化
                        // 原: JSON.stringify({type:'audio', data: Array.from(int16Array)}) → ~50KB JSON
                        // 新: ws.send(int16Array.buffer) → 8KB 二进制，带宽-84%, CPU大幅降低
                        const floatData = e.data;
                        const int16Array = new Int16Array(floatData.length);
                        for (let i = 0; i < floatData.length; i++) {
                            int16Array[i] = Math.max(-32768, Math.min(32767, floatData[i] * 32768));
                        }
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(int16Array.buffer);  // 二进制发送
                        }
                    };

                    source.connect(audioWorkletNode);
                    audioWorkletNode.connect(audioContext.destination); // For keep-alive? usually not needed for recording context

                    isRecording = true;
                    document.getElementById('mic-btn').classList.add('recording');
                    transitionTo('listening');
                    recordEvent('system', '麦克风录音已启动');

                } catch (err) {
                    console.error(err);
                    recordEvent('error', '麦克风启动失败', err.message || String(err));
                    alert("麦克风错误: " + err.message);
                }
            } else {
                // Stop
                isRecording = false;
                if (audioContext) audioContext.close();
                document.getElementById('mic-btn').classList.remove('recording');
                recordEvent('system', '麦克风录音已停止');
                // 🔥 统一: 进入处理状态（含思考动画）
                transitionTo('processing', '正在处理...');
                ws.send(JSON.stringify({ type: 'stop_recording' }));
            }
        }

        function sendTextMessage() {

            if (!ws || ws.readyState !== WebSocket.OPEN) {

            transitionTo('processing', '正在处理...');
        }
