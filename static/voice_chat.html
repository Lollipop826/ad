        let evalBadgeTimeout = null;

        function updateOrbEvalBadge(evalInfo) {
            const badge = document.getElementById('orb-eval-badge');
            if (!badge) return;
            
            // 清除之前的定时器
            if (evalBadgeTimeout) {
                clearTimeout(evalBadgeTimeout);
                evalBadgeTimeout = null;
            }

            if (!evalInfo) {
                badge.style.opacity = '0';
                badge.style.transform = 'translateY(10px)';
                return;
            }

            let badgeClass = 'pending';
            let badgeText = '评估中...';
            let icon = '⏳';
            
            if (evalInfo.is_chat) {
                badgeClass = 'chat';
                badgeText = '闲聊过渡';
                icon = '💬';
            } else if (evalInfo.quality_level === 'pending') {
                badgeClass = 'pending';
                badgeText = '后台评估中';
                icon = '🔄';
            } else {
                const isCorrect = evalInfo.is_correct || evalInfo.quality_level === 'excellent' || evalInfo.quality_level === 'good';
                badgeClass = isCorrect ? 'correct' : 'incorrect';
                icon = isCorrect ? '✅' : '❌';
                
                let scoreStr = '';
                if (evalInfo.score !== undefined && evalInfo.max_score !== undefined) {
                    scoreStr = ` ${evalInfo.score}/${evalInfo.max_score}分`;
                }
                
                const qMap = { 'excellent': '完美', 'good': '基本对', 'fair': '部分对', 'poor': '错误' };
                const qText = qMap[evalInfo.quality_level] || evalInfo.quality_level;
                badgeText = `${icon} ${qText}${scoreStr}`;
            }

            badge.className = `eval-label ${badgeClass}`;
            badge.innerHTML = badgeText;
            if (evalInfo.detail) {
                badge.title = evalInfo.detail;
            } else {
                badge.removeAttribute('title');
            }

            // 显示动画
            badge.style.opacity = '1';
            badge.style.transform = 'translate(-50%, -50%) scale(1)';
            
            // 只有处于 pending 时才持续显示，其他情况显示 5 秒后消失
            if (evalInfo.quality_level !== 'pending') {
                evalBadgeTimeout = setTimeout(() => {
                    badge.style.opacity = '0';
                    badge.style.transform = 'translate(-50%, -50%) scale(0.9)';
                }, 5000);
            }
        }

        function updateMMSE(data) {
            console.log('[MMSE] 收到评分数据:', JSON.stringify(data).slice(0, 300));

            const display = document.getElementById('mmse-total-score');

            // ① 从后端数据中提取维度得分
            // 后端路径: data.scoring_details.dimension_scores.{orientation, registration, attention_calculation, recall, language, copy}
            const dimScores = data?.scoring_details?.dimension_scores || {};
            if (Object.keys(dimScores).length > 0) {
                Object.keys(dimScores).forEach(key => {
                    if (mmseScores[key]) {
                        const val = dimScores[key].score !== undefined ? dimScores[key].score : 0;
                        mmseScores[key].score = val;
                    }
                });
            }

            // ② 计算总分（前端自己从维度相加，更可靠）
            const totalScore = Object.values(mmseScores).reduce((sum, d) => sum + (d.score || 0), 0);
            display.textContent = `${totalScore}/30`;

            // ③ 更新认知状态文字
            const statusEl = document.getElementById('mmse-status');
            if (statusEl) {
                if (data.cognitive_status && data.cognitive_status !== '未评估') {
                    statusEl.textContent = data.cognitive_status;
                } else if (totalScore > 0) {
                    statusEl.textContent = totalScore >= 27 ? '认知正常' :
                        totalScore >= 21 ? '轻度障碍' :
                        totalScore >= 10 ? '中度障碍' : '重度障碍';
                } else {
                    statusEl.textContent = '评估中';
                }
            }

            // ④ 维度定义（前端展示用）
            const dimensions = Object.entries(mmseDimensionMeta).map(([id, meta]) => ({
                id,
                label: meta.label,
                max: meta.max
            }));

            // ⑤ 重新渲染维度列表
            const list = document.getElementById('mmse-dimensions');
            list.innerHTML = '';
            dimensions.forEach(dim => {
                const score = mmseScores[dim.id]?.score || 0;
                const pct = dim.max > 0 ? (score / dim.max) * 100 : 0;
                const barColor = pct >= 80 ? '#38A169' : pct >= 50 ? '#D69E2E' : pct > 0 ? '#E53E3E' : '#CBD5E0';
                const row = document.createElement('div');
                row.style.marginBottom = '0.8rem';
                row.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.3rem;">
                        <span style="font-weight: 600; color: var(--text-primary);">${dim.label}</span>
                        <span style="color: var(--primary-color); font-weight: 700;">${score}/${dim.max}</span>
                    </div>
                    <div style="width: 100%; height: 8px; background: #EDF2F7; border-radius: 4px; overflow: hidden;">
                        <div style="width: ${pct}%; height: 100%; background: ${barColor}; border-radius: 4px; transition: width 0.6s ease;"></div>
                    </div>
                `;
                list.appendChild(row);
            });

            // ⑥ 真正更新雷达图数据
            if (window.radarChart) {
                window.radarChart.data.datasets[0].data = dimensions.map(dim => mmseScores[dim.id]?.score || 0);
                window.radarChart.update();
            }

            console.log('[MMSE] 更新完成, 总分:', totalScore, '维度:', JSON.stringify(mmseScores));
        }

        function resolveImageUrl(imageRef) {
            if (!imageRef) return '';

            const ref = String(imageRef).trim();
            if (!ref) return '';

            // 已是完整路径/地址
            if (
                ref.startsWith('http://') ||
                ref.startsWith('https://') ||
                ref.startsWith('data:') ||
                ref.startsWith('/')
            ) {
                return ref;
            }

            // 按 image_id 映射到 API 端点（比 StaticFiles 更可靠）
            const knownImageIds = new Set(['watch', 'pencil', 'close_eyes', 'pentagons']);
            if (knownImageIds.has(ref)) {
                return `/api/mmse-image/${ref}`;
            }

            // 容错：未知 id 也按 API 路径尝试
            return `/api/mmse-image/${ref}`;
        }

        // ===== 🎨 Drawing Canvas (数位板) =====
        let _drawingCtx = null;
        let _drawingHistory = [];  // 撤销栈（每笔保存快照）
        let _drawingActive = false;
        let _drawingLastX = 0;
        let _drawingLastY = 0;

        function _initDrawingCanvas() {
            const canvas = document.getElementById('drawing-canvas');
            if (!canvas) return;
            // 将 CSS 尺寸同步为像素分辨率（支持高 DPI）
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            _drawingCtx = canvas.getContext('2d');
            _drawingCtx.scale(dpr, dpr);
            _drawingCtx.fillStyle = '#ffffff';
            _drawingCtx.fillRect(0, 0, rect.width, rect.height);
            _drawingHistory = [];
            _saveDrawingSnapshot();

            // PointerEvents — 支持数位板压感、鼠标、触控
            canvas.addEventListener('pointerdown', _onDrawStart, { passive: false });
            canvas.addEventListener('pointermove', _onDrawMove, { passive: false });
            canvas.addEventListener('pointerup', _onDrawEnd, { passive: false });
            canvas.addEventListener('pointerleave', _onDrawEnd, { passive: false });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        function _getPos(e) {
            const canvas = document.getElementById('drawing-canvas');
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function _onDrawStart(e) {
            e.preventDefault();
            _drawingActive = true;
            const pos = _getPos(e);
            _drawingLastX = pos.x;
            _drawingLastY = pos.y;
            _drawingCtx.beginPath();
            _drawingCtx.arc(pos.x, pos.y, _getLineWidth(e) / 2, 0, Math.PI * 2);
            _drawingCtx.fillStyle = document.getElementById('drawing-color').value;
            _drawingCtx.fill();
        }

        function _onDrawMove(e) {
            if (!_drawingActive) return;
            e.preventDefault();
            const pos = _getPos(e);
            const lw = _getLineWidth(e);
            _drawingCtx.beginPath();
            _drawingCtx.moveTo(_drawingLastX, _drawingLastY);
            _drawingCtx.lineTo(pos.x, pos.y);
            _drawingCtx.strokeStyle = document.getElementById('drawing-color').value;
            _drawingCtx.lineWidth = lw;
            _drawingCtx.lineCap = 'round';
            _drawingCtx.lineJoin = 'round';
            _drawingCtx.stroke();
            _drawingLastX = pos.x;
            _drawingLastY = pos.y;
        }

        function _onDrawEnd(e) {
            if (!_drawingActive) return;
            _drawingActive = false;
            _saveDrawingSnapshot();
        }

        function _getLineWidth(e) {
            const base = parseInt(document.getElementById('drawing-size').value) || 4;
            // 数位板压感：pressure 范围 0~1，0.5 为默认
            const pressure = (e.pressure !== undefined && e.pressure > 0) ? e.pressure : 0.5;
            return base * (0.4 + pressure * 1.2);
        }

        function _saveDrawingSnapshot() {
            const canvas = document.getElementById('drawing-canvas');
            if (!canvas) return;
            _drawingHistory.push(canvas.toDataURL());
            if (_drawingHistory.length > 30) _drawingHistory.shift();
        }

        function drawingUndo() {
            if (_drawingHistory.length <= 1) return;
            _drawingHistory.pop();
            const canvas = document.getElementById('drawing-canvas');
            const img = new Image();
            img.onload = () => {
                const rect = canvas.getBoundingClientRect();
                _drawingCtx.clearRect(0, 0, rect.width, rect.height);
                _drawingCtx.drawImage(img, 0, 0, rect.width, rect.height);
            };
            img.src = _drawingHistory[_drawingHistory.length - 1];
        }

        function drawingClear() {
            const canvas = document.getElementById('drawing-canvas');
            const rect = canvas.getBoundingClientRect();
            _drawingCtx.fillStyle = '#ffffff';
            _drawingCtx.fillRect(0, 0, rect.width, rect.height);
            _drawingHistory = [];
            _saveDrawingSnapshot();
            document.getElementById('drawing-status').textContent = '画布已清除，重新临摹吧';
        }

        function showDrawingModal() {
            document.getElementById('drawing-modal').classList.add('open');

        function hideDrawingModal() {

            if (canvas) {
                canvas.removeEventListener('pointerdown', _onDrawStart);

        // ===== 📹 Camera & Hybrid Vision Evaluation (Video + Multi-Frame) =====
        let cameraStream = null;
        let currentVisionTaskId = null;
        let visionCaptureTimer = null;
        let _videoRecorder = null;
        let _videoChunks = [];

        // 视觉任务配置
        // duration: 录像时长；frames: 截帧数（视频模式可能不可用，多帧是主要方案）
        // 三步动作需要15s+8帧覆盖完整序列（抬手→摸耳→放下）
        const VISION_TASK_CONFIG = {
            'language_reading_close_eyes': { duration: 8000, frames: 4 },
            'language_3step_action':       { duration: 15000, frames: 8 },
            'copy_pentagons':              { duration: 8000, frames: 4 },
        };
        const DEFAULT_VISION_CONFIG = { duration: 8000, frames: 4 };

        async function startCamera() {
            if (cameraStream) return;
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' }
                });
                const video = document.getElementById('camera-preview');
                video.srcObject = cameraStream;
                document.getElementById('camera-container').classList.add('active');
                console.log('[Camera] ✅ 摄像头已开启');
            } catch (e) {
                console.error('[Camera] ❌ 无法打开摄像头:', e);
                cameraStream = null;
            }
        }

        function stopCamera() {
            if (_videoRecorder && _videoRecorder.state === 'recording') {
                _videoRecorder.stop();
            }
            _videoRecorder = null;
            _videoChunks = [];
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            document.getElementById('camera-container').classList.remove('active');
            currentVisionTaskId = null;
            if (visionCaptureTimer) {
                clearTimeout(visionCaptureTimer);
                visionCaptureTimer = null;
            }
            // 清理手动录制状态
            _manualRecording = false;
            _manualTaskId = null;
            _hideRecordControl();
            console.log('[Camera] 📴 摄像头已关闭');
        }

        // 从摄像头捕获一帧 JPEG base64
        function captureFrame() {
            const video = document.getElementById('camera-preview');
            if (!video.srcObject || video.videoWidth === 0) return null;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.85);
        }

        // 同时录视频 + 抽帧，返回 { videoBase64, mimeType, frames }
        function hybridCapture(durationMs, numFrames) {
            return new Promise((resolve) => {
                const frames = [];
                let videoBase64 = null;
                let mimeType = '';
                let videoReady = false;
                let framesReady = false;

                function tryResolve() {
                    if (videoReady && framesReady) {
                        resolve({ videoBase64, mimeType, frames });
                    }
                }

                // --- 录视频 ---
                _videoChunks = [];
                mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
                    ? 'video/webm;codecs=vp8'
                    : (MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : 'video/mp4');
                try {
                    _videoRecorder = new MediaRecorder(cameraStream, {
                        mimeType,
                        videoBitsPerSecond: 800000  // 800kbps
                    });
                    _videoRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) _videoChunks.push(e.data);
                    };
                    _videoRecorder.onstop = () => {
                        const blob = new Blob(_videoChunks, { type: mimeType });
                        if (blob.size > 500) {  // 有效视频
                            const reader = new FileReader();
                            reader.onloadend = () => {
                                videoBase64 = reader.result;
                                console.log(`[Video] ✅ 录制完成: ${(blob.size/1024).toFixed(0)}KB, ${mimeType}`);
                                videoReady = true;
                                tryResolve();
                            };
                            reader.onerror = () => { videoReady = true; tryResolve(); };
                            reader.readAsDataURL(blob);
                        } else {
                            console.warn('[Video] ⚠️ 录制文件过小，跳过');
                            videoReady = true;
                            tryResolve();
                        }
                    };
                    _videoRecorder.onerror = () => { videoReady = true; tryResolve(); };
                    _videoRecorder.start();
                    console.log(`[Video] 🔴 开始录制 (${durationMs}ms, ${mimeType})`);

                    setTimeout(() => {
                        if (_videoRecorder && _videoRecorder.state === 'recording') {
                            _videoRecorder.stop();
                        }
                    }, durationMs);
                } catch (e) {
                    console.warn('[Video] ⚠️ MediaRecorder不可用:', e);
                    videoReady = true;
                    tryResolve();
                }

                // --- 同时抽帧 ---
                const interval = Math.floor(durationMs / numFrames);
                let count = 0;
                console.log(`[Frames] 📸 同步抽帧: ${numFrames}帧, 间隔${interval}ms`);
                const timer = setInterval(() => {
                    const frame = captureFrame();
                    if (frame) frames.push(frame);
                    count++;
                    if (count >= numFrames) {
                        clearInterval(timer);
                        console.log(`[Frames] ✅ 抽帧完成: ${frames.length}帧`);
                        framesReady = true;
                        tryResolve();
                    }
                }, interval);
            });
        }

        async function triggerVisionEvaluation(taskId, context) {
            if (!cameraStream) {
                console.warn('[Vision] 摄像头未开启，无法评估');
                return null;
            }
            const statusEl = document.getElementById('camera-status');
            const labelEl = document.getElementById('camera-label');

            const cfg = VISION_TASK_CONFIG[taskId] || DEFAULT_VISION_CONFIG;
            statusEl.className = 'recording';
            statusEl.textContent = '🔴';
            labelEl.textContent = `录像+观察中 (${cfg.duration/1000}s)...`;

            try {
                const { videoBase64, mimeType, frames } = await hybridCapture(cfg.duration, cfg.frames);

                if (!videoBase64 && frames.length === 0) {
                    statusEl.className = '';
                    statusEl.textContent = '📹';
                    labelEl.textContent = '摄像头监测中';
                    return null;
                }

                statusEl.className = 'evaluating';
                statusEl.textContent = '🔍';
                labelEl.textContent = '正在AI视频分析...';

                // 构建请求：视频+帧都发，后端决定用哪个
                const payload = { task_id: taskId, context: context || '' };
                if (videoBase64) payload.video = videoBase64;
                if (videoBase64) payload.mime_type = mimeType;
                if (frames.length > 0) payload.frames = frames;

                const resp = await fetch('/api/vision-evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await resp.json();
                console.log('[Vision] 评估结果:', result);

                // 通过 WebSocket 将视觉评估结果发送给后端 Agent
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'vision_eval_result',
                        task_id: taskId,
                        result: result
                    }));
                }

                statusEl.className = '';
                statusEl.textContent = result.is_correct ? '✅' : (result.is_correct === false ? '❌' : '📹');
                labelEl.textContent = result.is_correct ? '动作正确' : (result.is_correct === false ? '未检测到' : '摄像头监测中');

                setTimeout(() => {
                    statusEl.textContent = '📹';
                    labelEl.textContent = '摄像头监测中';
                }, 3000);

                return result;
            } catch (e) {
                console.error('[Vision] 评估失败:', e);
                statusEl.className = '';
                statusEl.textContent = '📹';
                labelEl.textContent = '摄像头监测中';
                return null;
            }
        }

        // ========== 手动录制相关状态 ==========
        let _manualTaskId = null;
        let _manualRecording = false;
        let _manualTimerInterval = null;
        let _manualStartTime = 0;
        let _manualFrames = [];
        let _manualFrameTimer = null;

        function _showRecordControl(taskId) {
            const TASK_LABELS = {
                'language_3step_action': '请完成三步动作，准备好后点击开始',
            };
            document.getElementById('rec-task-label').textContent =
                TASK_LABELS[taskId] || '准备好后点击开始录制';
            document.getElementById('rec-timer').textContent = '00:00';

            document.getElementById('btn-rec-start').style.display = '';
            document.getElementById('btn-rec-stop').style.display = 'none';
            document.getElementById('record-control').classList.add('active');
        }

        function _hideRecordControl() {
            document.getElementById('record-control').classList.remove('active');
            if (_manualTimerInterval) {
                clearInterval(_manualTimerInterval);
                _manualTimerInterval = null;
            }
            if (_manualFrameTimer) {

        function _updateRecTimer() {
            const elapsed = Math.floor((Date.now() - _manualStartTime) / 1000);
            const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const ss = String(elapsed % 60).padStart(2, '0');
            document.getElementById('rec-timer').textContent = `${mm}:${ss}`;
        }

        // 用户点击"开始录制"
        function manualRecordStart() {
            if (!cameraStream || _manualRecording) return;

            _manualRecording = true;
            _manualFrames = [];
            _manualStartTime = Date.now();

            // UI 切换
            document.getElementById('btn-rec-start').style.display = 'none';
            document.getElementById('btn-rec-stop').style.display = '';
            document.getElementById('rec-timer').classList.add('recording');
            document.getElementById('rec-task-label').innerHTML =
                '<span class="rec-dot"></span>录制中...';
            document.getElementById('camera-status').className = 'recording';
            document.getElementById('camera-status').textContent = '🔴';
            document.getElementById('camera-label').textContent = '录制中';

            // 启动计时
            _manualTimerInterval = setInterval(_updateRecTimer, 500);

            // 启动 MediaRecorder
            _videoChunks = [];
            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
                ? 'video/webm;codecs=vp8'
                : (MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : 'video/mp4');
            try {
                _videoRecorder = new MediaRecorder(cameraStream, {
                    mimeType, videoBitsPerSecond: 800000
                });
                _videoRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) _videoChunks.push(e.data);
                };
                _videoRecorder.start();
                console.log(`[ManualRec] 🔴 开始录制 (${mimeType})`);
            } catch (e) {
                console.warn('[ManualRec] MediaRecorder不可用:', e);
            }

            // 同步抽帧（每2秒一帧）
            _manualFrameTimer = setInterval(() => {
                const frame = captureFrame();
                if (frame) _manualFrames.push(frame);
            }, 2000);
        }

        // 用户点击"结束录制"
        async function manualRecordStop() {
            if (!_manualRecording) return;
            _manualRecording = false;
            const taskId = _manualTaskId;

            // 停止计时和抽帧
            if (_manualTimerInterval) { clearInterval(_manualTimerInterval); _manualTimerInterval = null; }
            if (_manualFrameTimer) { clearInterval(_manualFrameTimer); _manualFrameTimer = null; }

            // 最后再截一帧
            const lastFrame = captureFrame();
            if (lastFrame) _manualFrames.push(lastFrame);

            // UI 切换到"分析中"
            document.getElementById('btn-rec-stop').disabled = true;
            document.getElementById('rec-task-label').textContent = '正在AI分析视频...';
            document.getElementById('camera-status').className = 'evaluating';
            document.getElementById('camera-status').textContent = '🔍';
            document.getElementById('camera-label').textContent = 'AI分析中...';

            // 停止 MediaRecorder 并等待数据
            let videoBase64 = null;
            let mimeType = '';
            if (_videoRecorder && _videoRecorder.state === 'recording') {
                mimeType = _videoRecorder.mimeType;
                await new Promise((resolve) => {
                    _videoRecorder.onstop = () => resolve();
                    _videoRecorder.stop();
                });
                const blob = new Blob(_videoChunks, { type: mimeType });
                if (blob.size > 500) {
                    videoBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = () => resolve(null);
                        reader.readAsDataURL(blob);
                    });
                    console.log(`[ManualRec] ✅ 视频 ${(blob.size/1024).toFixed(0)}KB`);
                }
            }

            console.log(`[ManualRec] 结束录制: 视频=${videoBase64 ? '有' : '无'}, 帧=${_manualFrames.length}`);

            // 发送到评估 API
            try {
                const payload = { task_id: taskId, context: '' };
                if (videoBase64) { payload.video = videoBase64; payload.mime_type = mimeType; }
                if (_manualFrames.length > 0) {
                    payload.frames = _manualFrames.map(f =>
                        f.startsWith('data:') ? f.split(',')[1] : f
                    );
                }

                const resp = await fetch('/api/vision-evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await resp.json();
                console.log('[ManualRec] 评估结果:', result);

                // 通过 WebSocket 将结果发送给后端 Agent
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'vision_eval_result',
                        task_id: taskId,
                        result: result
                    }));
                }

                // 显示结果
                document.getElementById('camera-status').className = '';
                document.getElementById('camera-status').textContent = result.is_correct ? '✅' : '❌';
                document.getElementById('camera-label').textContent =
                    result.is_correct ? '动作正确' : '动作不完整';
                document.getElementById('rec-task-label').textContent =
                    result.is_correct ? '✅ 评估完成：动作正确' : '❌ 评估完成：' + (result.evaluation_detail || '动作不完整');
                document.getElementById('btn-rec-stop').style.display = 'none';

            } catch (e) {
                console.error('[ManualRec] 评估失败:', e);
                document.getElementById('rec-task-label').textContent = '❌ 评估失败';
                // 通知后端
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'vision_eval_result',
                        task_id: taskId,
                        result: { success: false, error: e.message, is_correct: null }
                    }));
                }
            }

            // 3秒后隐藏控制面板和摄像头
            setTimeout(() => {
                _hideRecordControl();
                stopCamera();
            }, 4000);
        }

        async function startEnrollRecording() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('请先连接服务器');
                return;
            }

            try {
                enrollMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                enrollRecorder = new MediaRecorder(enrollMediaStream, { mimeType: 'audio/webm' });
                enrollChunks = [];

                enrollRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) enrollChunks.push(e.data);
                };

                enrollRecorder.onstop = async () => {
                    const blob = new Blob(enrollChunks, { type: 'audio/webm' });

                    // 转换为PCM并发送
                    const arrayBuffer = await blob.arrayBuffer();
                    const audioCtx = new AudioContext({ sampleRate: 16000 });
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    const pcmData = audioBuffer.getChannelData(0);

                    // 转为Int16
                    const int16Array = new Int16Array(pcmData.length);
                    for (let i = 0; i < pcmData.length; i++) {
                        int16Array[i] = Math.max(-32768, Math.min(32767, pcmData[i] * 32768));
                    }

                    // Base64编码发送
                    const base64 = btoa(String.fromCharCode(...new Uint8Array(int16Array.buffer)));
                    ws.send(JSON.stringify({ type: 'enroll_speaker_sample', audio: base64 }));

                    document.getElementById('enroll-status').textContent = '处理中...';
                    audioCtx.close();
                };

                enrollRecorder.start();
                isEnrolling = true;
                document.getElementById('enroll-btn').textContent = '⏹️ 停止录制';
                document.getElementById('enroll-btn').style.background = '#e53e3e';
                document.getElementById('enroll-status').textContent = '录制中...请说话';

            } catch (err) {
                console.error('录制失败:', err);
                alert('无法访问麦克风');
            }
        }

        function stopEnrollRecording() {
            if (enrollRecorder && enrollRecorder.state === 'recording') {

            let lines = [];

            lines.push('  记忆守护 · AD认知评估 — 对话记录');
            lines.push('============================================');
            lines.push(`患者姓名: ${patientName}`);
            lines.push(`导出时间: ${dateStr} ${timeStr}`);
            lines.push('--------------------------------------------');
            lines.push('');

            let turnIndex = 0;
            rows.forEach(row => {
                const isUser = row.classList.contains('user');
                const isAI = row.classList.contains('ai');
                const bubble = row.querySelector('.bubble');
                if (!bubble) return;
                // 获取纯文本（去掉情绪标签等HTML）
                const text = bubble.innerText.trim();
                if (!text) return;

                turnIndex++;
                const role = isUser ? '患者' : 'AI助手';
                lines.push(`[${String(turnIndex).padStart(3, '0')}] ${role}:`);
                lines.push(`  ${text}`);
                lines.push('');
            });

            lines.push('--------------------------------------------');
            lines.push(`共 ${turnIndex} 条消息`);

            const content = lines.join('\n');
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `对话记录_${patientName}_${now.toISOString().slice(0, 10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

                        ` : ''}
                        
                        <h2 style="color: #2d3748; border-left: 4px solid #4A90A4; padding-left: 10px; margin-top: 25px;">AI 评估建议</h2>
                        <div style="padding: 10px 0;">${llmAdviceHtml}</div>
                    </div>
                `;

                console.log('[PDF Export] 报告 HTML 是否包含建议:', reportHtml.includes('AI 评估建议'));
                console.log('[PDF Export] 建议内容预览:', reportHtml.substring(reportHtml.indexOf('AI 评估建议'), reportHtml.indexOf('AI 评估建议') + 300));

                // 创建临时容器
                const tempContainer = document.createElement('div');
                tempContainer.innerHTML = reportHtml;
                tempContainer.style.position = 'absolute';
                tempContainer.style.left = '-9999px';
                tempContainer.style.top = '0';
                document.body.appendChild(tempContainer);

                // 使用 html2canvas 截取并生成 PDF
                const reportElement = tempContainer.querySelector('#pdf-report-content');
                const canvas = await html2canvas(reportElement, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true
                });

                // 计算 PDF 尺寸并支持多页
                const imgWidth = 210; // A4 宽度 mm
                const pageHeight = 297; // A4 高度 mm
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');

                if (imgHeight <= pageHeight) {
                    // 单页：内容不超过一页
                    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, imgWidth, imgHeight);
                } else {
                    // 多页：按 A4 高度分割 canvas
                    const pageCanvasHeight = Math.floor(canvas.width * pageHeight / imgWidth);
                    let yOffset = 0;
                    let pageNum = 0;

                    while (yOffset < canvas.height) {
                        const sliceHeight = Math.min(pageCanvasHeight, canvas.height - yOffset);
                        
                        // 创建当前页的 canvas 切片
                        const pageCanvas = document.createElement('canvas');
                        pageCanvas.width = canvas.width;
                        pageCanvas.height = sliceHeight;
                        const ctx = pageCanvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
                        ctx.drawImage(canvas, 0, yOffset, canvas.width, sliceHeight, 0, 0, canvas.width, sliceHeight);

                        const sliceImgHeight = (sliceHeight * imgWidth) / canvas.width;

                        if (pageNum > 0) doc.addPage();
                        doc.addImage(pageCanvas.toDataURL('image/png'), 'PNG', 0, 0, imgWidth, sliceImgHeight);

                        yOffset += pageCanvasHeight;
                        pageNum++;
                    }
                    console.log(`[PDF Export] 生成 ${pageNum} 页报告`);
                }

                // 清理临时容器
                document.body.removeChild(tempContainer);

                // 下载
                const fileName = `AD认知筛查报告_${patientName}_${new Date().toISOString().slice(0, 10)}.pdf`;
                doc.save(fileName);

            } catch (error) {
                console.error('PDF 生成失败:', error);
                alert('报告生成失败，请重试: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-file-pdf"></i> 导出评估报告';
            }
        }

        // AI Recommendations Generator
        function generateAIRecommendations(totalScore, scores, emotions) {
            const recommendations = [];

            // 总体评估
            if (totalScore >= 27) {
                recommendations.push('• 整体认知功能良好，建议继续保持健康生活方式和社交活动。');
            } else if (totalScore >= 21) {
                recommendations.push('• 存在轻度认知功能下降，建议进行定期复查，并增加认知训练活动。');
            } else if (totalScore >= 10) {
                recommendations.push('• 存在中度认知障碍，强烈建议前往神经内科进行进一步检查和评估。');
            } else {
                recommendations.push('• 存在重度认知障碍，需要专业医疗介入和护理支持。');
            }

            // 维度分析（key与后端一致：attention_calculation）
            if ((scores.orientation?.score || 0) < 8) {
                recommendations.push('• 定向力得分偏低，可考虑在日常生活中加强时间和地点提醒，使用日历、钟表等辅助工具。');
            }
            if ((scores.registration?.score || 0) < 2) {
                recommendations.push('• 即时记忆能力偏弱，建议通过重复、联想等方法加强短期记忆训练。');
            }
            if ((scores.attention_calculation?.score || 0) < 3) {
                recommendations.push('• 注意力与计算能力需要加强，可尝试简单的数学游戏或拼图活动。');
            }
            if ((scores.recall?.score || 0) < 2) {
                recommendations.push('• 延迟回忆能力较弱，建议通过日记、备忘录等辅助记忆，是阿尔茨海默病早期筛查的重要指标。');
            }
            if ((scores.language?.score || 0) < 6) {
                recommendations.push('• 语言能力需要关注，鼓励多参与对话和阅读活动。');
            }
            if ((scores.copy?.score || 0) < 1) {
                recommendations.push('• 视空间能力有待评估，建议关注日常生活中的空间定位能力。');
            }

            // 情绪分析
            const totalEmotions = emotions.normal + emotions.avoidance + emotions.distress + emotions.hostility;
            if (totalEmotions > 0) {
                const negativeRatio = (emotions.avoidance + emotions.distress + emotions.hostility) / totalEmotions;
                if (negativeRatio > 0.5) {
                    recommendations.push('• 对话中检测到较多负面情绪表达，建议关注心理健康状况。');
                }
            }

            return recommendations.length > 0 ? recommendations : ['• 暂无特别建议，请继续保持良好的生活习惯。'];
        }

        // Init — 初始渲染维度列表 + 雷达图
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            // 渲染初始维度列表（全0分）
            updateMMSE({ scoring_details: { dimension_scores: {} } });
        });

        connectWebSocket();

    </script>
